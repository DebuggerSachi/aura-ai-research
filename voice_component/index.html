<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 4px; }
  html, body { height: 100%; background: #0d1117; }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-family: 'Segoe UI', sans-serif;
  }

  #mic-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 2px solid #3b82f6;
    background: #1f2937;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    outline: none;
  }
  #mic-btn:hover { background: #2d3748; border-color: #60a5fa; }
  #mic-btn.listening {
    border-color: #e74c3c;
    background: #2d1515;
    box-shadow: 0 0 0 4px rgba(231,76,60,0.3);
    animation: pulse 1s infinite;
  }
  #mic-btn.done { border-color: #10b981; background: #052e16; }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(231,76,60,0.4); }
    50%      { box-shadow: 0 0 0 8px rgba(231,76,60,0); }
  }

  #status {
    font-size: 0.7rem;
    color: #6b7280;
    text-align: center;
    min-height: 14px;
  }

  #transcript {
    display: none;
    font-size: 0.72rem;
    color: #93c5fd;
    text-align: center;
    font-style: italic;
    padding: 0 4px;
    word-break: break-word;
  }
</style>
</head>
<body>

<button id="mic-btn" title="Click to speak">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
       stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="9" y="2" width="6" height="12" rx="3"/>
    <path d="M5 10a7 7 0 0 0 14 0"/>
    <line x1="12" y1="19" x2="12" y2="22"/>
    <line x1="8" y1="22" x2="16" y2="22"/>
  </svg>
</button>
<div id="status">Click to speak</div>
<div id="transcript"></div>

<script>
  const btn = document.getElementById('mic-btn');
  const statusEl = document.getElementById('status');
  const transcriptEl = document.getElementById('transcript');

  let recognition = null;
  let finalText = '';
  let listening = false;
  let silenceTimer = null;

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SR) {
    statusEl.textContent = '⚠ Not supported';
    btn.disabled = true;
  }

  function init() {
    recognition = new SR();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'en-US';

    recognition.onstart = () => {
      btn.className = 'listening';
      statusEl.textContent = '🔴 Listening...';
      transcriptEl.style.display = 'none';
      transcriptEl.textContent = '';
      finalText = '';
    };

    recognition.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) finalText += e.results[i][0].transcript + ' ';
        else interim += e.results[i][0].transcript;
      }
      const display = (finalText + interim).trim();
      if (display) {
        transcriptEl.textContent = display;
        transcriptEl.style.display = 'block';
      }
      clearTimeout(silenceTimer);
      silenceTimer = setTimeout(() => {
        if (listening && finalText.trim()) finish();
      }, 2000);
    };

    recognition.onerror = (e) => {
      btn.className = '';
      statusEl.textContent = e.error === 'not-allowed' ? '❌ Mic denied' : 'Error: ' + e.error;
      listening = false;
    };

    recognition.onend = () => {
      if (listening && !finalText.trim()) {
        statusEl.textContent = 'Click to speak';
        btn.className = '';
        listening = false;
      }
    };
  }

  function finish() {
    listening = false;
    clearTimeout(silenceTimer);
    try { recognition.stop(); } catch(e) {}
    btn.className = 'done';
    const text = finalText.trim();
    statusEl.textContent = '✅ Sending...';
    if (text) {
      transcriptEl.textContent = text;
      transcriptEl.style.display = 'block';
      send(text);
    }
    setTimeout(() => {
      btn.className = '';
      statusEl.textContent = 'Click to speak';
      transcriptEl.style.display = 'none';
      finalText = '';
    }, 2000);
  }

  function send(value) {
    // Streamlit component protocol
    window.parent.postMessage({ type: 'streamlit:componentReady', apiVersion: 1 }, '*');
    window.parent.postMessage({
      type: 'streamlit:setComponentValue',
      apiVersion: 1,
      isWidget: true,
      value: value
    }, '*');
  }

  btn.addEventListener('click', () => {
    if (listening) { finish(); return; }
    if (!SR) return;
    init();
    listening = true;
    recognition.start();
  });

  // Signal ready on load
  window.addEventListener('load', () => {
    window.parent.postMessage({ type: 'streamlit:componentReady', apiVersion: 1 }, '*');
  });
</script>
</body>
</html>
